services:
  postgres:
    image: postgres:17-alpine
    container_name: finrecon-postgres
    environment:
      POSTGRES_DB: finrecon
      POSTGRES_USER: finrecon
      POSTGRES_PASSWORD: finrecon
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finrecon -d finrecon"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - finrecon-postgres-data:/var/lib/postgresql/data

volumes:
  finrecon-postgres-data:
