spring:
  application:
    name: FinRecon
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/finrecon}
    username: ${DB_USERNAME:finrecon}
    password: ${DB_PASSWORD:finrecon}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

info:
  app:
    name: FinRecon
    phase: Core Workflow

finrecon:
  auth:
    jwt-secret: ${FINRECON_JWT_SECRET:local-development-secret-change-me}
    expires-in-seconds: ${FINRECON_JWT_EXPIRES_IN_SECONDS:3600}
