spring:
  datasource:
    url: jdbc:h2:mem:finrecon;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: none
  flyway:
    enabled: true
  batch:
    jdbc:
      initialize-schema: always
    job:
      enabled: false

finrecon:
  auth:
    jwt-secret: test-secret
    expires-in-seconds: 3600
